---
claude-code-review:
  stage: review
  image: golang:1.26-alpine
  needs:
    - job: go-lint
      optional: true
  variables:
    ANTHROPIC_MODEL: "claude-sonnet-4-6"
    GOTOOLCHAIN: "local"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
  interruptible: true
  script:
    - cd tools/ci
    - go run ./cmd/claude-review
