---
spec:
  inputs:
    terraform_image:
      default: "hashicorp/terraform:1.15"
      description: "Terraform image for the fmt job."
    checkov_image:
      default: "bridgecrew/checkov:3.3.0"
      description: "Checkov image for the terraform-framework scan."
    checkov_dir:
      default: "terraform/"
      description: "Directory Checkov scans with --framework terraform."
    checkov_skip:
      default: "CKV_GIT_1,CKV_GLB_1,CKV_GLB_3,CKV_GLB_4"
      description: "Comma-separated check IDs to skip; tune per project."
---
# interruptible:false keeps the auto-commit push alive through auto_cancel.
terraform-fmt:
  stage: format
  image:
    name: "$[[ inputs.terraform_image ]]"
    entrypoint: [""]
  interruptible: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache git
    - git config user.email "gitlab-ci@noreply"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - terraform fmt -recursive
    - |
      if ! git diff --quiet; then
        git add -A
        git commit -m "style: terraform fmt"
        git push origin HEAD:${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
      fi

checkov-terraform:
  stage: lint
  image:
    name: "$[[ inputs.checkov_image ]]"
    entrypoint: [""]
  needs: []
  interruptible: true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.tf"
        - "**/*.hcl"
        - "**/*.tfvars"
        - "**/*.tofu"
  script:
    - checkov --directory $[[ inputs.checkov_dir ]] --framework terraform --compact --quiet
      --skip-check $[[ inputs.checkov_skip ]]
