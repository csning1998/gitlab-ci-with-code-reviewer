---
spec:
  inputs:
    python_image:
      default: 'python:3.11-alpine'
      description: 'Python image for ruff linter, formatter and testing.'
    python_globs:
      type: array
      default: ['**/*.py']
      description: 'Rules:changes globs gating python check and test jobs.'
    python_test_cmd:
      default: 'pytest'
      description: 'Command to run Python tests.'
---
ruff-fmt:
  stage: format
  image: '$[[ inputs.python_image ]]'
  interruptible: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.python_globs ]]
  before_script:
    - apk add --no-cache git
    - git config user.email "gitlab-ci@noreply"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - pip install ruff
  script:
    - ruff format .
    - ruff check --fix . || true
    - |
      if ! git diff --quiet; then
        git add -A
        git commit -m "style: ruff format and autofix"
        git push origin HEAD:${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
      fi

ruff-lint:
  stage: lint
  image: '$[[ inputs.python_image ]]'
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.python_globs ]]
  before_script:
    - pip install ruff
  script:
    - ruff check .

python-test:
  stage: test
  image: '$[[ inputs.python_image ]]'
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.python_globs ]]
  before_script:
    - pip install pytest pytest-asyncio httpx requests pydantic
  script:
    - $[[ inputs.python_test_cmd ]]
