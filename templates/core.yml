---
spec:
  inputs:
    reviewer_image:
      description: 'Required; prebuilt reviewer image pinned to a version (no default, no floating tag).'
    claude_model:
      default: ''
      description: 'Claude model id for the Claude reviewer. Leave empty to disable the job.'
    gemini_model:
      default: ''
      description: 'Gemini model id for the Gemini reviewer, including Gemma. Leave empty to disable the job.'
    markdownlint_image:
      default: 'markdownlint/markdownlint:0.17.0'
      description: 'Ruby mdl image for Markdown linting.'
    yamllint_image:
      default: 'pipelinecomponents/yamllint:0.35.12'
      description: 'yamllint image for YAML linting.'
    max_description_chars:
      type: number
      default: 5000
      description: 'Max MR description length sent to the reviewer; the pipeline fails if exceeded.'
    enable_commitlint:
      type: boolean
      default: true
      description: >-
        Enforces Conventional Commit format validation across the Merge Request commit range.
        Disabling this setting is recommended for repositories lacking a dedicated Continuous Integration pipeline.
---
# core.yml declares master pipeline stages and workflow auto-cancel rules; language components attach jobs to these stages.
workflow:
  auto_cancel:
    on_new_commit: interruptible

stages:
  - format
  - build
  - lint
  - test
  - review
  - deploy

# Rejects merge requests exceeding description character bounds prior to invoking LLM reviewer endpoints.
check-mr-description:
  stage: lint
  image: '$[[ inputs.reviewer_image ]]'
  interruptible: true
  variables:
    MAX_DESCRIPTION_CHARS: '$[[ inputs.max_description_chars ]]'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - mr-gate

commitlint:
  stage: lint
  image: '$[[ inputs.reviewer_image ]]'
  interruptible: true
  needs: []
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $[[ inputs.enable_commitlint ]] == "true"'
  script:
    - |
      commitlint --config /etc/commitlint/commitlint.config.cjs \
      --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --to "$CI_COMMIT_SHA"

markdownlint:
  stage: lint
  image:
    name: '$[[ inputs.markdownlint_image ]]'
    entrypoint: ['']
  allow_failure: true
  needs: []
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - '**/*.md'
  script:
    - mdl .

yamllint:
  stage: lint
  image: '$[[ inputs.yamllint_image ]]'
  needs: []
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - '**/*.yml'
        - '**/*.yaml'
  script:
    - yamllint .

# Omit explicit job dependencies (needs) to maintain compatibility across varying language component inclusions.
claude-code-review:
  stage: review
  image: '$[[ inputs.reviewer_image ]]'
  variables:
    CLAUDE_MODEL: '$[[ inputs.claude_model ]]'
    MAX_DESCRIPTION_CHARS: '$[[ inputs.max_description_chars ]]'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CLAUDE_MODEL != ""'
      when: manual
      allow_failure: true
  interruptible: true
  script:
    - claude-review

gemini-code-review:
  stage: review
  image: '$[[ inputs.reviewer_image ]]'
  variables:
    GEMINI_MODEL: '$[[ inputs.gemini_model ]]'
    MAX_DESCRIPTION_CHARS: '$[[ inputs.max_description_chars ]]'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $GEMINI_MODEL != ""'
      when: manual
      allow_failure: true
  interruptible: true
  script:
    - gemini-review
