---
spec:
  inputs:
    packer_image:
      default: "hashicorp/packer:1.15"
      description: "Packer image for the fmt job."
    packer_dir:
      default: "packer/"
      description: "Directory packer fmt rewrites recursively."
    packer_globs:
      type: array
      default: ["packer/**/*.hcl"]
      description: "rules:changes globs gating the fmt job."
---
# interruptible:false keeps the auto-commit push alive through auto_cancel.
packer-fmt:
  stage: format
  image:
    name: "$[[ inputs.packer_image ]]"
    entrypoint: [""]
  interruptible: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.packer_globs ]]
  before_script:
    - apk add --no-cache git
    - git config user.email "gitlab-ci@noreply"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - packer fmt -recursive $[[ inputs.packer_dir ]]
    - |
      if ! git diff --quiet; then
        git add -A
        git commit -m "style: packer fmt"
        git push origin HEAD:${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
      fi
