---
spec:
  inputs:
    module_dir:
      default: '$CI_PROJECT_DIR'
      description: >-
        Directory containing the Terraform module to package; scope this to a subdirectory
        when the repository hosts more than one module.
    module_name:
      default: '$CI_PROJECT_NAME'
      description: 'Terraform Module Registry module name.'
    module_system:
      default: 'local'
      description: 'Terraform Module Registry system (provider) identifier, e.g. gitlab.'
    curl_image:
      default: 'curlimages/curl:8.10.1'
      description: 'curl image for the registry upload job.'
---
# Packages inputs.module_dir and uploads it to this project's GitLab Terraform Module Registry
# on tag push, replicating the upload step of GitLab's own Terraform/Module-Base.gitlab-ci.yml
# hidden job without depending on that template's stage declarations.
terraform-module-deploy:
  stage: deploy
  image: '$[[ inputs.curl_image ]]'
  interruptible: false
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - MODULE_NAME=$(echo "$[[ inputs.module_name ]]" | tr " _" -)
    - TAR_FILENAME="/tmp/${MODULE_NAME}-$[[ inputs.module_system ]]-${CI_COMMIT_TAG}.tgz"
    - |
      UPLOAD_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${MODULE_NAME}\
      /$[[ inputs.module_system ]]/${CI_COMMIT_TAG}/file"
    - |
      tar -vczf "${TAR_FILENAME}" -C "$[[ inputs.module_dir ]]" \
      --exclude=./.git --exclude=./.terraform --exclude='*.tfstate*' --exclude='*.tfvars' .
    - |
      curl --fail-with-body --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
      --upload-file "${TAR_FILENAME}" "${UPLOAD_URL}"
