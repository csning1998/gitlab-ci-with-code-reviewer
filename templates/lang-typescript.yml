---
spec:
  inputs:
    bun_image:
      default: 'oven/bun:1-alpine'
      description: 'Bun image for prettier and the TypeScript type check.'
    ts_globs:
      type: array
      default: ['frontend/**/*', 'backend/**/*', 'contracts/**/*']
      description: 'rules:changes globs gating the type check and test jobs.'
    frontend_dir:
      default: 'frontend'
      description: 'Vue/frontend directory; checked with vue-tsc.'
    backend_dir:
      default: 'backend'
      description: 'Backend directory; checked with tsc --noEmit.'
---
# interruptible:false keeps the auto-commit push alive through auto_cancel.
prettier-fmt:
  stage: format
  image: '$[[ inputs.bun_image ]]'
  interruptible: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  before_script:
    - apk add --no-cache git
    - git config user.email "gitlab-ci@noreply"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - bun install
  script:
    - bunx prettier --write .
    - |
      if ! git diff --quiet; then
        git add -A
        git commit -m "style: prettier fmt"
        git push origin HEAD:${CI_MERGE_REQUEST_SOURCE_BRANCH_NAME}
      fi

# Frontend and backend are separate jobs so both type errors surface in one run
# instead of the backend check being skipped when the frontend check fails.
bun-test:
  stage: test
  image: '$[[ inputs.bun_image ]]'
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.ts_globs ]]
  script:
    - bun install
    - bun run --filter '*' test

typescript-check-frontend:
  stage: lint
  image: '$[[ inputs.bun_image ]]'
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.ts_globs ]]
  script:
    - cd $[[ inputs.frontend_dir ]]
    - bun install
    - bunx vue-tsc --noEmit

typescript-check-backend:
  stage: lint
  image: '$[[ inputs.bun_image ]]'
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: $[[ inputs.ts_globs ]]
  script:
    - cd $[[ inputs.backend_dir ]]
    - bun install
    - bunx tsc --noEmit
