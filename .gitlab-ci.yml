---
stages:
  - format
  - build
  - lint
  - review
  - release

include:
  # reviewer_image points at the :edge image this pipeline builds, so self-review
  # works before merge or tag.
  - local: templates/core.yml
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    inputs:
      reviewer_image: 'registry.gitlab.com/csning1998/gitlab-ci-with-code-reviewer/reviewer:edge'
  - local: templates/lang-go.yml
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  - local: templates/iac-terraform.yml
    rules:
      - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# MR pushes :edge (self-review needs it pre-merge); a semver tag pushes the version.
build-reviewer-image:
  stage: build
  image: quay.io/buildah/stable:v1.43.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
  variables:
    STORAGE_DRIVER: vfs
    IMAGE: '$CI_REGISTRY_IMAGE/reviewer'
  script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - buildah build -t "$IMAGE:build" -f tools/ci/Dockerfile tools/ci
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        buildah tag "$IMAGE:build" "$IMAGE:$CI_COMMIT_TAG"
        buildah push "$IMAGE:$CI_COMMIT_TAG"
      else
        buildah tag "$IMAGE:build" "$IMAGE:edge"
        buildah push "$IMAGE:edge"
      fi

publish-catalog:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:v0.24.0
  needs:
    - job: build-reviewer-image
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Publishing templates/ components for $CI_COMMIT_TAG to the CI/CD Catalog."
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'CI template release $CI_COMMIT_TAG'
